.actions-rules:release:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - releases/[0-9]*
      when: always
    - when: never

release:create:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  extends:
    - .actions-rules:release
  script:
    - apk add --no-cache curl jq
    - |
      # Find the latest release file (excluding draft-patch)
      LATEST_RELEASE=$(ls -1 releases/[0-9]* 2>/dev/null | sort -V | tail -1)
      if [ -z "$LATEST_RELEASE" ]; then
        echo "No release files found"
        exit 0
      fi
      VERSION=$(basename "$LATEST_RELEASE")
      echo "Checking release for $VERSION"
      
      # Check if release already exists
      EXISTING=$(curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases/$VERSION" | jq -r '.tag_name // empty')
      
      if [ -n "$EXISTING" ]; then
        echo "Release $VERSION already exists, skipping"
        exit 0
      fi
      
      echo "Creating release for $VERSION"
      
      # Extract release notes from the file
      RELEASE_NOTES=$(cat "$LATEST_RELEASE")
      echo "Release notes:"
      echo "$RELEASE_NOTES"
      
      # Create release using release-cli
      release-cli create \
        --name "Release $VERSION" \
        --tag-name "$VERSION" \
        --ref "$CI_COMMIT_SHA" \
        --description "$RELEASE_NOTES"
