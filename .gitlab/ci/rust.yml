rust-producer:lint:
  stage: test
  image: rust:1.88-slim
  extends:
    - .actions-rules:rust-producer
  cache:
    key: rust-producer
    paths:
      - src/services/rust-producer/target/
      - ~/.cargo/registry/
      - ~/.cargo/git/
  script:
    - cd src/services/rust-producer
    - rustup component add rustfmt
    - cargo fmt --check
    - cargo clippy -- -D warnings
