bff-storage:lint:
  stage: test
  image: golangci/golangci-lint:latest
  extends:
    - .actions-rules:bff-storage
  script:
    - cd src/services/bff-storage
    - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
    - golangci-lint run ./...

