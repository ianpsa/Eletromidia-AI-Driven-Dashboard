apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bigquery-writer-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: bigquery-writer
  namespaceSelector:
    matchNames:
      - dev 
  endpoints:
    - port: metrics
      interval: 5s
      path: /metrics