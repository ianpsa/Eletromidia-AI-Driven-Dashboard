apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bucket-consumer
    kafka-role: consumer
  name: bucket-consumer
spec:
  replicas: 20
  selector:
    matchLabels:
      app: bucket-consumer
      kafka-role: consumer
  strategy: {}
  template:
    metadata:
      labels:
        app: bucket-consumer
        kafka-role: consumer
    spec:
      securityContext:
        runAsUser: 1010
        runAsNonRoot: true
      automountServiceAccountToken: false
      containers:
      - image: southamerica-east1-docker.pkg.dev/midia-in-da-house/gke-cr/bucket-consumer:latest
        imagePullPolicy: Always
        name: bucket-consumer
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          failureThreshold: 5
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          failureThreshold: 2
          periodSeconds: 3
        envFrom:
          - configMapRef:
              name: bucket-consumer-cm
        volumeMounts:
          - name: gcs-sa-key
            mountPath: /secrets/cs-api-key.json
            subPath:  cs-api-key.json
            readOnly: true
        resources:
          requests:
            cpu: "10m"
            memory: "30Mi"
          limits:
            cpu: "50m"
            memory: "60Mi"
      volumes:
        - name: gcs-sa-key
          secret:
            secretName: gcs-sa-key