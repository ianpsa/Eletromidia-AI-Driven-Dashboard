apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bff-storage
  name: bff-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-storage
  strategy: {}
  template:
    metadata:
      labels:
        app: bff-storage
    spec:
      securityContext:
        runAsUser: 1010
        runAsNonRoot: true
      automountServiceAccountToken: false
      containers:
      - image: southamerica-east1-docker.pkg.dev/midia-in-da-house/gke-cr/bff-storage:latest
        name: bff-storage
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        imagePullPolicy: Always
        ports: 
          - containerPort: 8080
            name: http-web-svc
        livenessProbe:
          httpGet:
            path: /probe/startup
            port: 8080
          initialDelaySeconds: 10
          failureThreshold: 5
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /probe/startup
            port: 8080
          initialDelaySeconds: 5
          failureThreshold: 2
          periodSeconds: 10
        resources: 
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        envFrom:
          - configMapRef:
              name: bff-storage-cm
        volumeMounts:
          - name: gcs-sa-key
            mountPath: /secrets/cs-api-key.json
            subPath: cs-api-key.json
            readOnly: true
      volumes:
        - name: gcs-sa-key
          secret:
            secretName: gcs-sa-key 

