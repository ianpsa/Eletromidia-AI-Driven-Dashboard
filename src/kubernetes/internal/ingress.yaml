apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bff-storage-ingress
  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://midia-in-da-house.web.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # External Auth
    nginx.ingress.kubernetes.io/auth-url: "http://auth-middleware-svc.dev.svc.cluster.local/validate"
    nginx.ingress.kubernetes.io/auth-method: "GET"
    # Repassa o header Authorization para o /validate — substitui o auth-snippet
    nginx.ingress.kubernetes.io/auth-request-headers: "Authorization"
    nginx.ingress.kubernetes.io/limit-rpm: "100"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bff-storage-svc-ci
                port:
                  number: 80
          - path: /ai(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-svc
                port:
                  number: 80