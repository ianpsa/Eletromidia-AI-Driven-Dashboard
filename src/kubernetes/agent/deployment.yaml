apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: agent
  name: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      securityContext:
        runAsUser: 1010
        runAsNonRoot: true
      automountServiceAccountToken: false
      containers:
        - image: southamerica-east1-docker.pkg.dev/midia-in-da-house/gke-cr/agent:latest
          imagePullPolicy: Always
          name: agent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8001
              name: http-web-svc
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            failureThreshold: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: agent-cm
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GROQ_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: ANTHROPIC_API_KEY
                  # optional: true
          volumeMounts:
            - name: agent-sa-key
              mountPath: /secrets/bq-sa-key.json
              subPath: bq-sa-key.json
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "256Mi"
              cpu: "10m"
            limits:
              memory: "512Mi"
              cpu: "20m"
      volumes:
        - name: agent-sa-key
          secret:
            secretName: agent-sa-key
        - name: tmp
          emptyDir: {}
