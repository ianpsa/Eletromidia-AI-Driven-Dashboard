---
- name: Instalação do K3s Master Node (Control Plane)
  hosts: master-node
  become: true
  vars:
    k3s_version: "v1.31.4+k3s1"         # Altere para a versão desejada
    k3s_cluster_init: true                # true = primeiro master | false = masters adicionais
    k3s_server_url: ""                    # URL do primeiro master (ex: https://192.168.1.10:6443) — preencher para masters adicionais
    k3s_token: ""                         # Token do cluster — preencher para masters adicionais
    k3s_config_dir: /etc/rancher/k3s
    k3s_data_dir: /var/lib/rancher/k3s

  pre_tasks:
    - name: Verificar se o sistema é suportado
      ansible.builtin.assert:
        that:
          - ansible_os_family in ["Debian", "RedHat"]
        fail_msg: "Sistema operacional não suportado: {{ ansible_os_family }}"

    - name: Atualizar cache de pacotes (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Instalar dependências necessárias (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - open-iscsi
          - nfs-common
        state: present
      when: ansible_os_family == "Debian"

    - name: Instalar dependências necessárias (RedHat/CentOS)
      ansible.builtin.yum:
        name:
          - curl
          - ca-certificates
          - iscsi-initiator-utils
          - nfs-utils
        state: present
      when: ansible_os_family == "RedHat"

  tasks:
    # -------------------------------------------------------
    # Configuração do sistema
    # -------------------------------------------------------
    - name: Desabilitar swap temporariamente
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remover swap do /etc/fstab permanentemente
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Carregar módulos do kernel necessários
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Garantir módulos na inicialização
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay
        mode: "0644"

    - name: Configurar parâmetros de rede do kernel
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    # -------------------------------------------------------
    # Instalação do K3s — Primeiro Master (cluster-init)
    # -------------------------------------------------------
    - name: Instalar K3s como primeiro master (cluster-init com etcd embarcado)
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          sh -s - server \
          --cluster-init
      args:
        creates: /usr/local/bin/k3s
      when: k3s_cluster_init | bool

    # -------------------------------------------------------
    # Instalação do K3s — Masters adicionais (join)
    # -------------------------------------------------------
    - name: Validar variáveis para master adicional
      ansible.builtin.assert:
        that:
          - k3s_server_url != ""
          - k3s_token != ""
        fail_msg: "Para masters adicionais, defina k3s_server_url e k3s_token nas variáveis."
      when: not (k3s_cluster_init | bool)

    - name: Instalar K3s como master adicional (join no cluster)
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          K3S_TOKEN="{{ k3s_token }}" \
          sh -s - server \
          --server "{{ k3s_server_url }}"
      args:
        creates: /usr/local/bin/k3s
      when: not (k3s_cluster_init | bool)

    # -------------------------------------------------------
    # Validação pós-instalação
    # -------------------------------------------------------
    - name: Aguardar o serviço K3s iniciar
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true

    - name: Aguardar o node ficar Ready
      ansible.builtin.command: >
        k3s kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[-1].type}'
      register: node_status
      retries: 20
      delay: 15
      until: node_status.stdout == "Ready"
      changed_when: false

    - name: Exibir token do cluster (necessário para adicionar outros nodes)
      ansible.builtin.command: cat /var/lib/rancher/k3s/server/node-token
      register: node_token
      changed_when: false
      when: k3s_cluster_init | bool

    - name: Mostrar token na saída do playbook
      ansible.builtin.debug:
        msg: "NODE TOKEN: {{ node_token.stdout }} | Guarde este token para adicionar masters e workers."
      when: k3s_cluster_init | bool

    - name: Verificar status dos nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: nodes_output
      changed_when: false

    - name: Exibir nodes do cluster
      ansible.builtin.debug:
        msg: "{{ nodes_output.stdout_lines }}"

  post_tasks:
    - name: Copiar kubeconfig para o diretório home do usuário
      ansible.builtin.copy:
        src: "{{ k3s_config_dir }}/k3s.yaml"
        dest: "{{ ansible_env.HOME }}/.kube/config"
        remote_src: true
        mode: "0600"
      when: k3s_cluster_init | bool

    - name: Informar localização do kubeconfig
      ansible.builtin.debug:
        msg: "Kubeconfig disponível em: {{ k3s_config_dir }}/k3s.yaml"